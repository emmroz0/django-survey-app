{% load static %}
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Badanie{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'survey/css/custom.css' %}">
    {% block extra_css %}
    {% endblock %}
</head>
<body class="d-flex flex-column min-vh-100">
    <main class="flex-grow-1 bg-secondary bg-gradient">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="py-3 mt-auto bg-dark">
        <div class="container text-center text-white small">
            &copy; {% now "Y" %} Michał Mroziński, Uniwersytet Kazimierza Wielkiego w&nbsp;Bydgoszczy.
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    {% block extra_js %}
    {% endblock %}
</body>
</html>
